name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, typecheck & migrate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: instainv
          POSTGRES_PASSWORD: instainv
          POSTGRES_DB: instainv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U instainv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://instainv:instainv@localhost:5432/instainv?schema=public
      AUTH_SECRET: ci-only-secret-at-least-32-characters-long-000000
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
